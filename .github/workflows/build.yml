name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint
        run: ./gradlew lintDebug

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: folio-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # Build the release APK on every push to catch R8/minify breakage early.
      # Without signing secrets this produces an unsigned APK that still validates
      # the release build; tag builds below are signed.
      - name: Build release APK (unsigned R8 check)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew assembleRelease

      - name: Decode signing keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build signed release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SIGNING_KEYSTORE: release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: folio-release
          path: app/build/outputs/apk/release/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: folio-release

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv app-release.apk "folio-${VERSION}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            folio-*.apk
